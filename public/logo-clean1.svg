<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Clean rounded square -->
  <rect width="200" height="200" rx="40" fill="#1e293b"/>
  
  <!-- Simple sound wave bars -->
  <g fill="#3b82f6">
    <rect x="40" y="70" width="12" height="60" rx="6"/>
    <rect x="65" y="50" width="12" height="100" rx="6"/>
    <rect x="90" y="60" width="12" height="80" rx="6"/>
  </g>
  
  <!-- Faded/cut bars (right side) -->
  <g fill="#3b82f6" opacity="0.25">
    <rect x="115" y="65" width="12" height="70" rx="6"/>
    <rect x="140" y="55" width="12" height="90" rx="6"/>
  </g>
  
  <!-- Simple vertical cut line -->
  <rect x="104" y="40" width="4" height="120" rx="2" fill="#ef4444"/>
</svg>
