<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Simple dark background -->
  <rect width="200" height="200" rx="40" fill="#0f172a"/>
  
  <!-- Scissors icon - simple and clean -->
  <g fill="none" stroke="#3b82f6" stroke-width="10" stroke-linecap="round">
    <!-- Top handle -->
    <circle cx="70" cy="70" r="20"/>
    <!-- Bottom handle -->
    <circle cx="70" cy="130" r="20"/>
    <!-- Blades -->
    <line x1="88" y1="78" x2="150" y2="100"/>
    <line x1="88" y1="122" x2="150" y2="100"/>
  </g>
</svg>
