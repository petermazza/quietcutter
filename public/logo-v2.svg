<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="#0f172a"/>
  
  <!-- Muted speaker icon -->
  <g fill="#3b82f6">
    <!-- Speaker body -->
    <path d="M 45 75 L 70 75 L 100 50 L 100 150 L 70 125 L 45 125 Z"/>
  </g>
  
  <!-- Sound waves being cut -->
  <g stroke="#3b82f6" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M 115 70 Q 135 100, 115 130" opacity="0.3"/>
    <path d="M 130 55 Q 160 100, 130 145" opacity="0.2"/>
  </g>
  
  <!-- Cut/slash through waves -->
  <line x1="105" y1="45" x2="165" y2="155" stroke="#ef4444" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Small scissor icon -->
  <g transform="translate(155, 145) scale(0.4)">
    <circle cx="0" cy="-20" r="12" fill="none" stroke="#f59e0b" stroke-width="4"/>
    <circle cx="0" cy="20" r="12" fill="none" stroke="#f59e0b" stroke-width="4"/>
    <line x1="0" y1="-8" x2="-25" y2="0" stroke="#f59e0b" stroke-width="4"/>
    <line x1="0" y1="8" x2="-25" y2="0" stroke="#f59e0b" stroke-width="4"/>
  </g>
</svg>
