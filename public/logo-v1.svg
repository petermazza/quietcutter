<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#1e293b"/>
  
  <!-- Sound wave being cut -->
  <g stroke="#3b82f6" stroke-width="4" fill="none" stroke-linecap="round">
    <!-- Left side of wave (intact) -->
    <path d="M 30 100 Q 45 70, 60 100 Q 75 130, 90 100" opacity="0.8"/>
    
    <!-- Right side of wave (faded/cut) -->
    <path d="M 110 100 Q 125 70, 140 100 Q 155 130, 170 100" opacity="0.3" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Scissors -->
  <g fill="#f59e0b">
    <!-- Top blade -->
    <ellipse cx="100" cy="85" rx="15" ry="6" transform="rotate(-30 100 85)"/>
    <!-- Bottom blade -->
    <ellipse cx="100" cy="115" rx="15" ry="6" transform="rotate(30 100 115)"/>
    <!-- Center pivot -->
    <circle cx="100" cy="100" r="8" fill="#f59e0b"/>
    <circle cx="100" cy="100" r="4" fill="#1e293b"/>
  </g>
  
  <!-- Cut line effect -->
  <line x1="100" y1="60" x2="100" y2="140" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>
</svg>
